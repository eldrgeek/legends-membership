<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="/favicon-192.png">
  <title>Committee Login | Legends of Basketball</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- SOMA Auth (replaces Netlify Identity) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/soma-auth-config.js"></script>
  <script src="/js/soma-auth.js"></script>
  <!-- <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script> -->
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 100%);
      padding: 40px 24px;
    }
    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 0.75rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }
    .login-gold-line {
      width: 48px;
      height: 3px;
      background: var(--gold);
      margin: 0 auto 32px;
    }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--navy);
      margin-bottom: 12px;
    }
    .login-desc {
      font-size: 0.9rem;
      color: var(--text-medium);
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      box-sizing: border-box;
      margin-bottom: 14px;
      transition: border-color 0.15s;
      outline: none;
    }
    .login-input:focus { border-color: var(--navy); }
    .login-btn {
      display: inline-block;
      background: var(--navy);
      color: var(--gold);
      border: none;
      padding: 14px 36px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .login-btn:hover { background: var(--navy-mid); }
    .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .login-msg {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      display: none;
    }
    .login-msg.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .login-msg.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .login-footer-note {
      font-size: 0.78rem;
      color: var(--text-light);
      margin-top: 24px;
      line-height: 1.5;
    }
    .login-footer-note a { color: var(--navy); }
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Legends of Basketball</div>
    <div class="login-sub">Membership Services Committee</div>
    <div class="login-gold-line"></div>
    <h1 class="login-title">Committee Access</h1>
    <p class="login-desc">
      Enter your committee email address. We'll send you a magic link — click it to sign in instantly, no password needed.
    </p>
    <input type="email" id="login-email" class="login-input" placeholder="your@email.com" autocomplete="email" />
    <button class="login-btn" id="login-btn">Send Sign-In Link</button>
    <div id="login-msg" class="login-msg"></div>
    <p class="login-footer-note">
      Don't have an account? Contact <a href="mailto:gfos44@gmail.com">Greg Foster</a> to receive an invitation.
    </p>
  </div>
</div>

<script>
  var params = new URLSearchParams(window.location.search);

  // Show confirmed banner if redirected from confirmation flow
  if (params.get('confirmed') === '1') {
    var banner = document.createElement('div');
    banner.style.cssText = 'background:#16a34a;color:#fff;padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:0.88rem;font-weight:600;text-align:center;';
    banner.textContent = 'Email confirmed! Enter your email below to sign in.';
    var card = document.querySelector('.login-card');
    var btn = document.getElementById('login-btn');
    card.insertBefore(banner, btn);
  }

  var redirectTo = '/members.html';
  try {
    var r = params.get('redirect');
    if (r && r.startsWith('/') && !r.startsWith('//')) redirectTo = r;
  } catch(e) {}

  // If already signed in (e.g., magic link lands here), redirect immediately.
  // Also handles Supabase processing the magic link token from the URL hash.
  SomaAuth.onAuthStateChange(function(event, session) {
    if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session) {
      window.location.replace(redirectTo);
    }
  });
  SomaAuth.init(window.SOMA_AUTH_CONFIG.url, window.SOMA_AUTH_CONFIG.anonKey);

  // Magic-link form submit
  document.getElementById('login-btn').addEventListener('click', function() {
    var email = document.getElementById('login-email').value.trim();
    var msg = document.getElementById('login-msg');
    var btn = document.getElementById('login-btn');
    if (!email || !email.includes('@')) {
      msg.textContent = 'Please enter a valid email address.';
      msg.className = 'login-msg error';
      msg.style.display = 'block';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Sending…';
    msg.style.display = 'none';
    var origin = window.location.origin || 'https://legends-membership.netlify.app';
    SomaAuth.signInWithOtp(email, { emailRedirectTo: origin + redirectTo })
      .then(function(result) {
        btn.disabled = false;
        btn.textContent = 'Send Sign-In Link';
        if (result.error) {
          msg.textContent = result.error.message || 'Sign-in failed. Please try again.';
          msg.className = 'login-msg error';
        } else {
          msg.textContent = 'Check your email — a sign-in link is on its way!';
          msg.className = 'login-msg success';
          document.getElementById('login-email').value = '';
        }
        msg.style.display = 'block';
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'Send Sign-In Link';
        msg.textContent = err.message || 'Unable to reach auth server. Please try again later.';
        msg.className = 'login-msg error';
        msg.style.display = 'block';
      });
  });

  // Allow pressing Enter in the email field
  document.getElementById('login-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
</script>

</body>
</html>
